repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        files: ^web/socratic/.*\.py$
        pass_filenames: false
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast)
        entry: uv run pytest -m "not slow"
        language: system
        pass_filenames: false
        types: [python]
